{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/favorites.css') }}">

    <!-- 🧭 NAVBAR -->
    <nav class="welcome-nav">
        <div class="logo-container">
            <svg class="logo-svg" viewBox="0 0 420 80" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="watchGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#7f5cff"/>
                        <stop offset="100%" stop-color="#ec4899"/>
                    </linearGradient>

                    <filter id="glow">
                        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

            <a href="{{ url_for('welcome') }}" class="logo-link">
                <!-- WATCH -->
                <text x="160" y="55" class="logo-watch">NextWatch</text>
            </a>
            </svg>
        </div>

        <div class="nav-right">

           <!-- 🎯 ALWAYS VISIBLE -->
            <a href="{{ url_for('home', type='anime') }}" class="logo-link">
            <button class="anime-btn">
                Animes
            </button>
            </a>

            <!-- 🎯 ALWAYS VISIBLE -->
             <a href="{{ url_for('home', type='movie') }}" class="logo-link">
            <button class="movie-btn">
                Movies
            </button>
            </a>

            {% if user %}
                <a href="{{ url_for('profile') }}" class="logo-link">
                <img src="/static/{{ user.avatar_value }}" class="avatar">
                </a>
                <a href="/logout" class="nav-btn">Logout</a>
            {% else %}
                <a href="/login" class="nav-btn">Login</a>
            {% endif %}
        </div>
    </nav>

<section class="favorites-page">

    <header class="favorites-header">
        <h1>❤️ Your Favorites</h1>
        <p>Everything you’ve saved, in one place</p>
    </header>

    <div class="favorites-filters">
        <button data-type="all" class="active">All</button>
        <button data-type="anime">Anime</button>
        <button data-type="movie">Movies</button>
    </div>

    <div id="favoritesGrid" class="content-grid"></div>

    <div id="favoritesEmpty" class="empty-state hidden">
        <p>💔 No favorites yet</p>
        <span>Save anime and movies you love, and they’ll show up here.</span>
    </div>

</section>

<script src="{{ url_for('static', filename='js/favorites.js') }}"></script>

{% endblock %}
